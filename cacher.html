<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice JS</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }
    .calculator {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    #resultat {
      width: 100%;
      height: 50px;
      margin-bottom: 10px;
      text-align: right;
      font-size: 24px;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
    }
    button {
      height: 60px;
      font-size: 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #ddd;
    }
    .equal {
      grid-column: span 2;
      background: orange;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" id="resultat" disabled>
    <div class="buttons">
      <button onclick="ajouter('7')">7</button>
      <button onclick="ajouter('8')">8</button>
      <button onclick="ajouter('9')">9</button>
      <button onclick="ajouter('/')">/</button>

      <button onclick="ajouter('4')">4</button>
      <button onclick="ajouter('5')">5</button>
      <button onclick="ajouter('6')">6</button>
      <button onclick="ajouter('*')">*</button>

      <button onclick="ajouter('1')">1</button>
      <button onclick="ajouter('2')">2</button>
      <button onclick="ajouter('3')">3</button>
      <button onclick="ajouter('-')">-</button>

      <button onclick="ajouter('0')">0</button>
      <button onclick="ajouter('%')">%</button>
      <button onclick="ajouter('+')">+</button>
      <button onclick="effacer()">C</button>

      <button class="equal" onclick="calculer()">=</button>
    </div>
  </div>

  <script>
    let expression = "";

    function ajouter(val) {
      expression += val;
      document.getElementById("resultat").value = expression;
    }

    function effacer() {
      expression = "";
      document.getElementById("resultat").value = "";
    }

    function calculer() {
      try {
        // Récupère les deux nombres et l'opérateur
        let operateursList = ['+','-','*','/','%'];
        let operateur = operateursList.find(op => expression.includes(op));

        if (operateur) {
          let [nombre1, nombre2] = expression.split(operateur).map(Number);

          let resultat = operteurs(nombre1, nombre2, operateur);
          document.getElementById("resultat").value = resultat;
          expression = resultat.toString();
        }
      } catch (error) {
        document.getElementById("resultat").value = "Erreur";
      }
    }

    // === Tes fonctions ===
    function addition(nombre1,nombre2){
      return nombre1 + nombre2;
    }
    function sustraction(nombre1,nombre2){
      return nombre1 - nombre2;
    }
    function multiplication(nombre1,nombre2){
      return nombre1 * nombre2;
    }
    function division(nombre1,nombre2){
      return nombre1 / nombre2;
    }
    function modulo(nombre1,nombre2){
      return nombre1 % nombre2;
    }
    function operteurs (nombre1,nombre2,operateur){
      switch(operateur){
        case "+": return addition(nombre1,nombre2);
        case "-": return sustraction(nombre1,nombre2);
        case "*": return multiplication(nombre1,nombre2);
        case "/": return division(nombre1,nombre2);
        case "%": return modulo(nombre1,nombre2);
        default: return "Opérateur non valide";
      }
    }
  </script>
</body>
</html>
